name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build addon zip
        run: |
          mkdir -p CHFrames
          cp CHFrames.lua CHFrames_Frames.lua CHFrames_Minimap.lua CHFrames_Settings.lua CHFrames_HideBlizzard.lua CHFrames.toc CHFrames/
          zip -r CHFrames-${{ github.ref_name }}.zip CHFrames/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: CHFrames-${{ github.ref_name }}.zip
