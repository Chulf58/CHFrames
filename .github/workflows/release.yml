name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build addon zip
        run: |
          mkdir -p CH_DPadParty
          cp CH_DPadParty.lua CH_DPadParty_Frames.lua CH_DPadParty_Minimap.lua CH_DPadParty_Settings.lua CH_DPadParty.toc CH_DPadParty/
          zip -r CH_DPadParty-${{ github.ref_name }}.zip CH_DPadParty/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: CH_DPadParty-${{ github.ref_name }}.zip
